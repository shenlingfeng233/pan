<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="color-scheme" content="dark">
<meta name="theme-color" content="#313338">

<title>PHQ-9 抑郁筛查</title>

<style>
:root{
    --bg:#1e1f22;
    --bg-secondary:#2b2d31;
    --bg-tertiary:#313338;
    --card:#2b2d31;
    --primary:#5865f2;
    --primary-hover:#6d78f5;
    --success:#23a55a;
    --warning:#f0b232;
    --danger:#da373c;
    --text:#f2f3f5;
    --text-secondary:#b5bac1;
    --border:#3f4147;
    --shadow:0 10px 30px rgba(0,0,0,.35);
    --radius:18px;
    --transition:.25s ease;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html{
    scroll-behavior:smooth;
}

body{
    background:var(--bg);
    color:var(--text);
    font-family:
        "Segoe UI",
        "Microsoft YaHei",
        "PingFang SC",
        sans-serif;
    min-height:100vh;
    overflow-x:hidden;
}

/* ==========================
   Accessibility
========================== */

*:focus-visible{
    outline:3px solid var(--primary);
    outline-offset:3px;
}

@media (prefers-contrast: more){
    :root{
        --text:#ffffff;
        --border:#ffffff;
    }
}

/* ==========================
   Animation
========================== */

@keyframes fadeIn{
    from{
        opacity:0;
        transform:translateY(15px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

@keyframes slideLeft{
    from{
        opacity:0;
        transform:translateX(40px);
    }
    to{
        opacity:1;
        transform:translateX(0);
    }
}

@keyframes pulse{
    0%{
        transform:scale(1);
    }
    50%{
        transform:scale(1.03);
    }
    100%{
        transform:scale(1);
    }
}

.fade-in{
    animation:fadeIn .4s ease;
}

.slide-in{
    animation:slideLeft .4s ease;
}

/* ==========================
   Layout
========================== */

.app{
    width:100%;
    min-height:100vh;
    display:flex;
    flex-direction:column;
}

header{
    position:sticky;
    top:0;
    z-index:100;
    background:rgba(30,31,34,.95);
    backdrop-filter:blur(10px);
    border-bottom:1px solid var(--border);
}

.header-inner{
    max-width:1000px;
    margin:auto;
    padding:16px 20px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:20px;
}

.logo{
    font-size:1.2rem;
    font-weight:700;
}

main{
    flex:1;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:40px 20px;
}

.container{
    width:100%;
    max-width:900px;
}

.card{
    background:var(--card);
    border:1px solid var(--border);
    border-radius:var(--radius);
    box-shadow:var(--shadow);
    padding:32px;
    animation:fadeIn .4s ease;
}

/* ==========================
   Language Switcher
========================== */

.language-switcher{
    display:flex;
    gap:8px;
    flex-wrap:wrap;
}

.lang-btn{
    border:none;
    cursor:pointer;
    padding:8px 14px;
    border-radius:10px;
    background:var(--bg-secondary);
    color:var(--text);
    transition:var(--transition);
}

.lang-btn:hover{
    background:var(--primary);
}

.lang-btn.active{
    background:var(--primary);
}

/* ==========================
   Home Page
========================== */

.home-title{
    text-align:center;
    font-size:2.2rem;
    font-weight:700;
    margin-bottom:18px;
}

.home-description{
    text-align:center;
    color:var(--text-secondary);
    line-height:1.8;
    margin-bottom:30px;
}

.notice-box{
    background:rgba(240,178,50,.1);
    border:1px solid rgba(240,178,50,.4);
    border-radius:14px;
    padding:18px;
    margin-bottom:25px;
}

.notice-box h3{
    margin-bottom:10px;
    color:var(--warning);
}

.notice-box ul{
    padding-left:20px;
}

.notice-box li{
    margin:8px 0;
    color:var(--text-secondary);
    line-height:1.6;
}

.checkbox-area{
    display:flex;
    align-items:flex-start;
    gap:12px;
    margin-bottom:25px;
}

.checkbox-area input{
    margin-top:3px;
    transform:scale(1.3);
}

.checkbox-area label{
    line-height:1.7;
    color:var(--text-secondary);
}

/* ==========================
   Buttons
========================== */

.btn{
    border:none;
    cursor:pointer;
    transition:var(--transition);
    font-size:1rem;
}

.btn-primary{
    background:var(--primary);
    color:white;
    padding:14px 30px;
    border-radius:12px;
    font-weight:600;
}

.btn-primary:hover{
    background:var(--primary-hover);
    transform:translateY(-2px);
}

.btn-primary:disabled{
    opacity:.5;
    cursor:not-allowed;
    transform:none;
}

.btn-secondary{
    background:var(--bg-tertiary);
    color:white;
    padding:12px 22px;
    border-radius:12px;
}

.btn-secondary:hover{
    background:#454750;
}

.center{
    text-align:center;
}

/* ==========================
   Progress
========================== */

.progress-wrapper{
    margin-bottom:30px;
}

.progress-info{
    display:flex;
    justify-content:space-between;
    margin-bottom:10px;
    color:var(--text-secondary);
}

.progress-bar{
    width:100%;
    height:12px;
    background:var(--bg-secondary);
    border-radius:999px;
    overflow:hidden;
}

.progress-fill{
    height:100%;
    width:0%;
    background:linear-gradient(
        90deg,
        var(--primary),
        #8ea1ff
    );
    transition:.4s ease;
}

/* ==========================
   Question Page
========================== */

.question-title{
    font-size:1.7rem;
    line-height:1.6;
    margin-bottom:35px;
}

.answer-list{
    display:flex;
    flex-direction:column;
    gap:14px;
}

.answer-btn{
    width:100%;
    border:none;
    cursor:pointer;
    text-align:left;
    padding:18px;
    border-radius:14px;
    background:var(--bg-secondary);
    color:var(--text);
    border:1px solid transparent;
    transition:var(--transition);
}

.answer-btn:hover{
    transform:translateX(5px);
    border-color:var(--primary);
    background:var(--bg-tertiary);
}

.answer-btn.selected{
    border-color:var(--primary);
    background:rgba(88,101,242,.18);
}

.answer-label{
    font-weight:600;
    margin-bottom:4px;
}

.answer-desc{
    color:var(--text-secondary);
    font-size:.95rem;
}
/* ==========================
   Result Page
========================== */

.result-header{
    text-align:center;
    margin-bottom:35px;
}

.score-number{
    font-size:4rem;
    font-weight:800;
    margin:15px 0;
}

.score-level{
    font-size:1.4rem;
    font-weight:600;
}

.level-none{
    color:var(--success);
}

.level-light{
    color:#6bc46d;
}

.level-moderate{
    color:var(--warning);
}

.level-moderately-severe{
    color:#ff8c42;
}

.level-severe{
    color:var(--danger);
}

.chart-wrapper{
    display:flex;
    justify-content:center;
    margin:35px 0;
}

.chart-card{
    background:var(--bg-secondary);
    border-radius:18px;
    padding:20px;
    border:1px solid var(--border);
}

#scoreChart{
    max-width:300px;
    width:100%;
}

.result-grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:20px;
    margin-top:30px;
}

.info-box{
    background:var(--bg-secondary);
    border-radius:16px;
    padding:20px;
    border:1px solid var(--border);
}

.info-box h3{
    margin-bottom:12px;
}

.info-box p{
    line-height:1.8;
    color:var(--text-secondary);
}

.warning-box{
    margin-top:25px;
    background:rgba(218,55,60,.12);
    border:1px solid rgba(218,55,60,.4);
    border-radius:16px;
    padding:20px;
}

.warning-box h3{
    color:var(--danger);
    margin-bottom:10px;
}

.warning-box p{
    line-height:1.8;
}

.result-actions{
    margin-top:35px;
    display:flex;
    justify-content:center;
    gap:15px;
    flex-wrap:wrap;
}

/* ==========================
   Export Modal
========================== */

.modal-overlay{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.65);
    display:none;
    align-items:center;
    justify-content:center;
    padding:20px;
    z-index:999;
}

.modal-overlay.show{
    display:flex;
    animation:fadeIn .25s ease;
}

.modal{
    width:100%;
    max-width:520px;
    background:var(--card);
    border-radius:20px;
    border:1px solid var(--border);
    padding:25px;
}

.modal-title{
    font-size:1.3rem;
    margin-bottom:20px;
}

.export-options{
    display:flex;
    flex-direction:column;
    gap:14px;
}

.export-option{
    display:flex;
    align-items:center;
    gap:10px;
}

.export-option input{
    transform:scale(1.2);
}

.modal-actions{
    margin-top:25px;
    display:flex;
    justify-content:flex-end;
    gap:12px;
}

/* ==========================
   Print
========================== */

.print-only{
    display:none;
}

@media print{

    body{
        background:white;
        color:black;
    }

    header,
    .result-actions,
    .modal-overlay{
        display:none !important;
    }

    .card{
        box-shadow:none;
        border:none;
    }

    .print-only{
        display:block;
    }
}

/* ==========================
   Loading
========================== */

.loading{
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    gap:20px;
}

.spinner{
    width:50px;
    height:50px;
    border:5px solid var(--bg-secondary);
    border-top:5px solid var(--primary);
    border-radius:50%;
    animation:spin 1s linear infinite;
}

@keyframes spin{
    from{
        transform:rotate(0deg);
    }
    to{
        transform:rotate(360deg);
    }
}

/* ==========================
   Utility
========================== */

.hidden{
    display:none !important;
}

.mt-20{
    margin-top:20px;
}

.mt-30{
    margin-top:30px;
}

.text-center{
    text-align:center;
}

.w-100{
    width:100%;
}

/* ==========================
   Mobile
========================== */

@media (max-width:768px){

    .card{
        padding:22px;
    }

    .home-title{
        font-size:1.8rem;
    }

    .question-title{
        font-size:1.3rem;
    }

    .score-number{
        font-size:3rem;
    }

    .result-grid{
        grid-template-columns:1fr;
    }

    .header-inner{
        flex-direction:column;
        align-items:flex-start;
    }

    .language-switcher{
        width:100%;
    }

    .lang-btn{
        flex:1;
    }
}

@media (max-width:480px){

    main{
        padding:20px 12px;
    }

    .card{
        padding:18px;
    }

    .answer-btn{
        padding:14px;
    }

    .btn-primary{
        width:100%;
    }

    .result-actions{
        flex-direction:column;
    }

    .result-actions button{
        width:100%;
    }
}
</style>
</head>

<body>

<div class="app">

<header>
    <div class="header-inner">

        <div class="logo"
             id="siteTitle">
            PHQ-9 抑郁筛查
        </div>

        <div class="language-switcher"
             role="group"
             aria-label="Language Switcher">

            <button class="lang-btn active"
                    data-lang="zh-CN">
                简体中文
            </button>

            <button class="lang-btn"
                    data-lang="zh-TW">
                繁體中文
            </button>

            <button class="lang-btn"
                    data-lang="ja">
                日本語
            </button>

            <button class="lang-btn"
                    data-lang="en">
                English
            </button>

        </div>

    </div>
</header>

<main>

<div class="container">

<!-- 首页 -->
<section id="homePage"
         class="card">

    <h1 class="home-title"
        id="homeTitle">
        PHQ-9 抑郁筛查
    </h1>

    <p class="home-description"
       id="homeDescription">
    </p>

    <div class="notice-box">

        <h3 id="noticeTitle">
            注意事项
        </h3>

        <ul id="noticeList">
        </ul>

    </div>

    <div class="checkbox-area">

        <input type="checkbox"
               id="agreementCheckbox"
               aria-required="true">

        <label for="agreementCheckbox"
               id="agreementText">
        </label>

    </div>

    <div class="center">

        <button id="startButton"
                class="btn btn-primary"
                disabled>
            开始测评
        </button>

    </div>

</section>

<!-- 题目页 -->
<section id="questionPage"
         class="card hidden"
         aria-live="polite">

    <div class="progress-wrapper">

        <div class="progress-info">

            <span id="questionCounter">
                1 / 9
            </span>

            <span id="progressPercent">
                11%
            </span>

        </div>

        <div class="progress-bar">

            <div class="progress-fill"
                 id="progressFill">
            </div>

        </div>

    </div>
    <h2 id="questionText"
        class="question-title">
        Question
    </h2>

    <div id="answerList"
         class="answer-list">

        <!-- JS动态生成答案 -->

    </div>

</section>

<!-- 结果页 -->
<section id="resultPage"
         class="card hidden">

    <div class="result-header">

        <h2 id="resultTitle">
            测评结果
        </h2>

        <div id="scoreNumber"
             class="score-number">
            0
        </div>

        <div id="scoreLevel"
             class="score-level">
            -
        </div>

        <div id="testTime"
             class="mt-20">
        </div>

    </div>

    <div class="chart-wrapper">

        <div class="chart-card">

            <canvas id="scoreChart"
                    width="300"
                    height="300"
                    aria-label="PHQ-9 Score Chart"
                    role="img">
            </canvas>

        </div>

    </div>

    <div class="result-grid">

        <div class="info-box">

            <h3 id="summaryTitle">
                总结
            </h3>

            <p id="summaryContent">
            </p>

        </div>

        <div class="info-box">

            <h3 id="adviceTitle">
                建议
            </h3>

            <p id="adviceContent">
            </p>

        </div>

    </div>

    <div id="riskWarning"
         class="warning-box hidden">

        <h3 id="riskWarningTitle">
            风险提示
        </h3>

        <p id="riskWarningContent">
        </p>

    </div>

    <div class="result-actions">

        <button id="exportButton"
                class="btn btn-primary">
            导出 PDF
        </button>

        <button id="restartButton"
                class="btn btn-secondary">
            重新作答
        </button>

    </div>

</section>

<!-- 加载页 -->
<section id="loadingPage"
         class="card hidden">

    <div class="loading">

        <div class="spinner"></div>

        <div id="loadingText">
            Loading...
        </div>

    </div>

</section>

</div>

</main>

<!-- PDF导出设置 -->
<div id="exportModal"
     class="modal-overlay"
     aria-hidden="true">

    <div class="modal"
         role="dialog"
         aria-modal="true"
         aria-labelledby="exportTitle">

        <h2 id="exportTitle"
            class="modal-title">
            导出选项
        </h2>

        <div class="export-options">

            <label class="export-option">
                <input type="checkbox"
                       id="pdfScore"
                       checked>
                <span id="pdfScoreText">
                    总分
                </span>
            </label>

            <label class="export-option">
                <input type="checkbox"
                       id="pdfLevel"
                       checked>
                <span id="pdfLevelText">
                    风险等级
                </span>
            </label>

            <label class="export-option">
                <input type="checkbox"
                       id="pdfChart"
                       checked>
                <span id="pdfChartText">
                    环形图
                </span>
            </label>

            <label class="export-option">
                <input type="checkbox"
                       id="pdfAdvice"
                       checked>
                <span id="pdfAdviceText">
                    建议
                </span>
            </label>

            <label class="export-option">
                <input type="checkbox"
                       id="pdfTime"
                       checked>
                <span id="pdfTimeText">
                    测评时间
                </span>
            </label>

        </div>

        <div class="modal-actions">

            <button id="cancelExport"
                    class="btn btn-secondary">
                取消
            </button>

            <button id="confirmExport"
                    class="btn btn-primary">
                打印
            </button>

        </div>

    </div>

</div>

<!-- 打印专用区域 -->
<div id="printContainer"
     class="print-only">
</div>

<script>
/* =========================================================
   PART 2
   i18n + PHQ-9题库 + 全局状态管理
========================================================= */

/* ==========================

========================== */

/* ==========================
   Language Detection
========================== */

function detectLanguage(){

    const saved = localStorage.getItem("phq9_language");

    if(saved){
        return saved;
    }

    const browser = navigator.language || "en";

    if(browser.startsWith("zh-CN")) return "zh-CN";
    if(browser.startsWith("zh")) return "zh-TW";
    if(browser.startsWith("ja")) return "ja";

    return "en";
}

function renderQuestion() {

    const lang = t();

    const index =
        state.currentQuestion;

    const total =
        PHQ9_KEYS.length;

    const percent =
        Math.round(
            ((index + 1) / total) * 100
        );

    questionCounter.textContent =
        `${index + 1} / ${total}`;

    progressPercent.textContent =
        `${percent}%`;

    progressFill.style.width =
        `${percent}%`;

    questionText.textContent =
        lang.questions[index];

    answerList.innerHTML = "";

    lang.answers.forEach(
        (answer, score) => {

            const button =
                document.createElement(
                    "button"
                );

            button.type = "button";

            button.className =
                "answer-btn slide-in";

            button.setAttribute(
                "aria-label",
                answer.label
            );

            button.innerHTML = `
                <div class="answer-label">
                    ${answer.label}
                </div>

                <div class="answer-desc">
                    ${answer.desc}
                </div>
            `;

            button.addEventListener(
                "click",
                () => {

                    submitAnswer(score);

                }
            );

            answerList.appendChild(
                button
            );

        }
    );
}

========================== */

document.addEventListener(
    "keydown",
    event => {

        if(
            questionPage.classList.contains(
                "hidden"
            )
        ){
            return;
        }

        const key = event.key;

        if(
            key === "1"
        ){
            submitAnswer(0);
        }

        if(
            key === "2"
        ){
            submitAnswer(1);
        }

        if(
            key === "3"
        ){
            submitAnswer(2);
        }

        if(
            key === "4"
        ){
            submitAnswer(3);
        }

    }
);

/* ==========================
   Answer Submit
========================== */

function submitAnswer(score) {

    state.answers.push(score);

    if(
        state.currentQuestion === 8 &&
        score > 0
    ){
        state.q9Risk = true;
    }

    state.currentQuestion++;

    if(
        state.currentQuestion >=
        PHQ9_KEYS.length
    ){

        finishAssessment();

        return;
    }

    renderQuestion();
}

    setTimeout(() => {

/* ==========================

function calculateResults() {

    const score =
        state.answers.reduce(
            (a, b) => a + b,
            0
        );

    state.score = score;

    const level =
        SCORE_LEVELS.find(item =>
            score >= item.min &&
            score <= item.max
        );

    state.level =
        level.key;

    state.levelClass =
        level.className;

    renderResults();
}

/* ==========================
   Canvas Helpers
========================== */

function clearCanvas() {

    ctx.clearRect(
        0,
        0,
        canvas.width,
        canvas.height
    );
}

function polarToCartesian(
    cx,
    cy,
    r,
    angle
){

    return {
        x:
            cx +
            r *
            Math.cos(angle),

        y:
            cy +
            r *
            Math.sin(angle)
    };
}

/* ==========================
   Animated Donut Chart
========================== */

function renderChart() {

    clearCanvas();

    const maxScore = 27;

    const ratio =
        state.score / maxScore;

    let progress = 0;

    const centerX = 150;
    const centerY = 150;

    const radius = 100;

    const lineWidth = 20;

    function animate() {

        clearCanvas();

        ctx.beginPath();
        ctx.arc(
            centerX,
            centerY,
            radius,
            0,
            Math.PI * 2
        );

        ctx.strokeStyle =
            "#3f4147";

        ctx.lineWidth =
            lineWidth;

        ctx.stroke();

        const start =
            -Math.PI / 2;

        const end =
            start +
            (
                Math.PI * 2 *
                progress
            );

        ctx.beginPath();

        ctx.arc(
            centerX,
            centerY,
            radius,
            start,
            end
        );

        const gradient =
            ctx.createLinearGradient(
                0,
                0,
                300,
                300
            );

        gradient.addColorStop(
            0,
            "#5865f2"
        );

        gradient.addColorStop(
            1,
            "#8ea1ff"
        );

        ctx.strokeStyle =
            gradient;

        ctx.lineWidth =
            lineWidth;

        ctx.lineCap =
            "round";

        ctx.stroke();

        ctx.fillStyle =
            "#f2f3f5";

        ctx.textAlign =
            "center";

        ctx.textBaseline =
            "middle";

        ctx.font =
            "bold 48px Segoe UI";

        ctx.fillText(
            state.score,
            centerX,
            centerY - 12
        );

        ctx.font =
            "16px Segoe UI";

        ctx.fillStyle =
            "#b5bac1";

        ctx.fillText(
            "/ 27",
            centerX,
            centerY + 28
        );

        progress += 0.02;

        if(
            progress <= ratio
        ){
            requestAnimationFrame(
                animate
            );
        }
    }

    animate();
}

    }

    if(pdfTime.checked){

        html += `
        <p>
            <strong>
            ${txt.time}:
            </strong>
            ${testTime.textContent}
        </p>
        `;
    }

    if(pdfAdvice.checked){

        html += `
        <h3>
            ${txt.advice}
        </h3>

        <p>
            ${
                ADVICE[
                    state.language
                ][state.level]
            }
        </p>
        `;
    }

    if(
        pdfChart.checked
    ){

        try{

            const image =
                canvas.toDataURL(
                    "image/png"
                );

            html += `
            <div style="
                margin-top:20px;
            ">
                <img
                    src="${image}"
                    style="
                    width:280px;
                    ">
            </div>
            `;

        }catch(error){

            console.error(error);

        }
    }

    if(state.q9Risk){

        html += `
        <div style="
            margin-top:20px;
            padding:15px;
            border:1px solid red;
        ">

        <strong>
        ${
            t().riskTitle
        }
        </strong>

        <p>
        ${
            t().riskContent
        }
        </p>

        </div>
        `;
    }

    html += `
    </div>
    `;

    return html;
}

/* ==========================
   Print
========================== */

confirmExport.addEventListener(
    "click",
    () => {

        printContainer.innerHTML =
            buildPrintHTML();

        closeExportModal();

        setTimeout(
            () => {

                window.print();

            },
            150
        );

    }
);

/* ==========================
   ESC Support
========================== */

document.addEventListener(
    "keydown",
    e => {

        if(
            e.key === "Escape" &&
            exportModal.classList.contains(
                "show"
            )
        ){

            closeExportModal();

        }

    }
);

/* ==========================
   Responsive Repaint
========================== */

window.addEventListener(
    "resize",
    () => {

        if(
            !resultPage.classList.contains(
                "hidden"
            )
        ){

            renderChart();

        }

    }
);

/* ==========================
   Accessibility Labels
========================== */

function applyAccessibility(){

    startButton.setAttribute(
        "aria-label",
        "Start Assessment"
    );

    exportButton.setAttribute(
        "aria-label",
        "Export PDF"
    );

    restartButton.setAttribute(
        "aria-label",
        "Restart"
    );

    canvas.setAttribute(
        "role",
        "img"
    );
}

applyAccessibility();

/* ==========================
   Final Init
========================== */

(function init(){

    applyLanguage();

    hideAllPages();

    homePage.classList.remove(
        "hidden"
    );

    startButton.disabled = true;

    agreementCheckbox.checked =
        false;

})();

/* =========================================================
   END OF FILE
========================================================= */
</script>
