<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人空间站</title>
    <style>
        /* 基础样式重置 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* 赛博深色背景 */
        body {
            background-color: #0d1117;
            color: #c9d1d9;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
        }

        /* 头部标题区 */
        header {
            text-align: center;
            margin-bottom: 50px;
        }

        header h1 {
            font-size: 2.5rem;
            color: #58a6ff;
            font-weight: 600;
            letter-spacing: 2px;
            margin-bottom: 10px;
            text-shadow: 0 0 20px rgba(88, 166, 255, 0.2);
        }

        header p {
            color: #8b949e;
            font-size: 1rem;
        }

        /* 区域分界线与标题 */
        .section-title {
            width: 100%;
            max-width: 1200px;
            font-size: 1.25rem;
            color: #8b949e;
            margin: 30px 0 15px 20px;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
        }

        .section-title::after {
            content: "";
            flex-grow: 1;
            height: 1px;
            background: linear-gradient(90deg, #30363d, transparent);
            margin-left: 15px;
        }

        /* 卡片网格布局 */
        .container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px;
            max-width: 1200px;
            width: 100%;
            margin-bottom: 40px;
        }

        /* 基础卡片样式 */
        .card {
            background-color: #161b22;
            border: 1px solid #30363d;
            border-radius: 12px;
            padding: 25px;
            text-decoration: none;
            color: inherit;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
        }

        /* 活跃项目卡片悬浮效果 */
        .card.active:hover {
            transform: translateY(-5px);
            border-color: #58a6ff;
            box-shadow: 0 10px 30px rgba(88, 166, 255, 0.1);
            background-color: #1f242c;
        }

        /* 正经内容卡片专属悬浮效果 */
        .card.serious:hover {
            transform: translateY(-5px);
            border-color: #7ef19d;
            box-shadow: 0 10px 30px rgba(126, 241, 157, 0.1);
            background-color: #1f2c24;
        }

        /* 开发中卡片样式 */
        .card.developing {
            cursor: not-allowed;
            opacity: 0.6;
        }

        /* 卡片内头部（图标与标题） */
        .card-header {
            display: flex;
            align-items: center;
            margin-bottom: 15px;
        }

        .card-icon {
            font-size: 1.8rem;
            margin-right: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .card-title {
            font-size: 1.2rem;
            font-weight: 600;
            color: #f0f6fc;
        }

        /* 卡片简介 */
        .card-desc {
            font-size: 0.95rem;
            color: #8b949e;
            line-height: 1.6;
            flex-grow: 1;
        }

        /* 状态标签 */
        .status-badge {
            position: absolute;
            top: 12px;
            right: 12px;
            font-size: 0.75rem;
            padding: 3px 8px;
            border-radius: 20px;
            font-weight: 500;
        }

        .status-badge.online {
            background-color: rgba(56, 139, 253, 0.15);
            color: #58a6ff;
        }

        .status-badge.tool {
            background-color: rgba(126, 241, 157, 0.15);
            color: #7ef19d;
        }

        .status-badge.pending {
            background-color: rgba(240, 136, 62, 0.15);
            color: #f0883e;
        }

        /* 响应式调整 */
        @media (max-width: 600px) {
            header h1 { font-size: 2rem; }
            .container { grid-template-columns: 1fr; }
            .section-title { margin-left: 0; }
        }
    </style>
</head>
<body>

    <header>
        <h1>个人空间站</h1>
        <p>探索、思考与灵感的汇聚地</p>
    </header>

    <div class="section-title">✨ 奇思妙想</div>
    <div class="container">

        <a href="#" class="card active" target="_blank">
            <span class="status-badge online">已上线</span>
            <div class="card-header">
                <span class="card-icon">🧬</span>
                <h2 class="card-title">性别检测项目</h2>
            </div>
            <p class="card-desc">一个用奇思妙想探索特质的趣味检测工具。</p>
        </a>

        <div class="card developing">
            <span class="status-badge pending">孵化中</span>
            <div class="card-header">
                <span class="card-icon">🐒</span>
                <h2 class="card-title">无限猴子打字机</h2>
            </div>
            <p class="card-desc">正在用随机概率敲击出下一部莎士比亚名著。</p>
        </div>

        <div class="card developing">
            <span class="status-badge pending">孵化中</span>
            <div class="card-header">
                <span class="card-icon">🐑</span>
                <h2 class="card-title">电子羊催眠器</h2>
            </div>
            <p class="card-desc">为仿生人量身定制的深夜梦境发生器。</p>
        </div>

    </div>

    <div class="section-title">📊 理性探索</div>
    <div class="container">

        <a href="PHQ-9.html" class="card serious" target="_blank">
            <span class="status-badge tool">专业量表</span>
            <div class="card-header">
                <span class="card-icon">📝</span>
                <h2 class="card-title">PHQ-9 自测表</h2>
            </div>
            <p class="card-desc">病人健康问卷（Patient Health Questionnaire-9），用于情绪状态的自我评估与筛查。</p>
        </a>

    </div>

</body>
</html>
